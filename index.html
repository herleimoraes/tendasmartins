<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos OS Martins</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📋 Pedidos Registrados</h2>
        
        <div class="busca-container">
            <input type="text" id="inputBusca" onkeyup="filtrarTabela()" placeholder="🔍 Buscar por cliente ou descrição...">
        </div>

        <div id="status-msg">Conectando ao servidor...</div>
        <a href="cadastro.html" class="btn-novo">+ Novo Registro</a>

        <div class="tabela-wrapper">
            <table id="tabelaPedidos">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modalArquivo">
        <div id="modalConteudo">
            <iframe id="frameArquivo" src=""></iframe>
            <button onclick="fecharModal()" class="btn-fechar-modal">Fechar Visualização</button>
        </div>
    </div>

    <script>
        // SUBSTITUA PELA SUA URL DO GOOGLE APPS SCRIPT
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbwJtiRVRnzqr3lEQo05WAfoEQQWSx3bzJbHfKCNM0sYzOPJbfnHHmvAaCpzCPBa7q52SQ/exec';

        // FUNÇÕES DO MODAL
        function abrirModal(url) {
            if (!url || url === '---') { alert('Este registro não possui arquivo anexo.'); return; }
            // Transforma link de view em preview para embutir
            const previewUrl = url.replace('/view', '/preview').replace('?usp=drivesdk', '');
            document.getElementById('frameArquivo').src = previewUrl;
            document.getElementById('modalArquivo').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava scroll do fundo
        }

        function fecharModal() {
            document.getElementById('modalArquivo').style.display = 'none';
            document.getElementById('frameArquivo').src = '';
            document.body.style.overflow = 'auto'; // Libera scroll
        }

        // FUNÇÃO DE BUSCA/FILTRO (Melhorada para Mobile)
        function filtrarTabela() {
            const filtro = document.getElementById('inputBusca').value.toLowerCase();
            const corpoTablea = document.getElementById('corpoTabela');
            const linhas = corpoTablea.getElementsByTagName('tr');
            let resultados = 0;

            for (let i = 0; i < linhas.length; i++) {
                // Pega o texto visível do card inteiro
                const textoDoCard = linhas[i].innerText.toLowerCase();
                if (textoDoCard.includes(filtro)) {
                    linhas[i].style.display = "";
                    resultados++;
                } else {
                    linhas[i].style.display = "none";
                }
            }
            
            const status = document.getElementById('status-msg');
            if (filtro !== '') {
                status.innerText = `Encontrados ${resultados} registros para "${filtro}".`;
            } else {
                // Recarrega o total original (precisaríamos guardar o total global)
                status.innerText = `Total de registros carregados.`; 
            }
        }

        // FUNÇÃO PRINCIPAL: CARREGAR DADOS
       async function carregarDados() {
    const corpo = document.getElementById('corpoTabela');
    const status = document.getElementById('status-msg');
    
    corpo.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: #666;">Carregando pedidos...</td></tr>';

    try {
        const response = await fetch(URL_SCRIPT, { cache: "no-store" });
        if (!response.ok) throw new Error("Falha na rede");
        const dadosRaw = await response.json();
        
        corpo.innerHTML = '';
        
        if (!dadosRaw || dadosRaw.length === 0) {
            status.innerText = "Nenhum registro encontrado.";
            corpo.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px;">A planilha está vazia.</td></tr>';
            return;
        }

        // --- LÓGICA DE AGRUPAMENTO ---
        const pedidosAgrupados = {};

        dadosRaw.forEach(item => {
            // Criamos uma chave única baseada no Cliente + Data + Descrição
            const chave = `${item.cliente}-${item.data}-${item.descricao}`;
            
            if (!pedidosAgrupados[chave]) {
                pedidosAgrupados[chave] = {
                    data: item.data,
                    cliente: item.cliente,
                    descricao: item.descricao,
                    arquivos: []
                };
            }
            // Adiciona o link ao array de arquivos deste pedido
            if (item.arquivoUrl && item.arquivoUrl.includes('drive.google.com')) {
                pedidosAgrupados[chave].arquivos.push(item.arquivoUrl);
            }
        });

        const listaFinal = Object.values(pedidosAgrupados);
        status.innerText = `Exibindo ${listaFinal.length} pedidos (Total de anexos: ${dadosRaw.length}).`;

        // Inverte para ver o mais recente primeiro
        listaFinal.reverse().forEach(pedido => {
            let dataFormatada = "---";
            if(pedido.data) {
                const d = new Date(pedido.data);
                dataFormatada = !isNaN(d) ? d.toLocaleDateString('pt-BR') : pedido.data;
            }

            // Cria os botões de anexos dinamicamente
            let botoesAnexos = "";
            if (pedido.arquivos.length > 0) {
                pedido.arquivos.forEach((url, index) => {
                    botoesAnexos += `<button onclick="abrirModal('${url}')" class="btn-acao btn-visualizar">Anexo ${index + 1}</button>`;
                });
            } else {
                botoesAnexos = `<span style="color:#999; font-size:12px;">Sem anexos</span>`;
            }

            const rowHTML = `
                <tr>
                    <td>${dataFormatada}</td>
                    <td><strong>${pedido.cliente || 'Cliente não informado'}</strong></td>
                    <td>${pedido.descricao || 'Sem descrição'}</td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            ${botoesAnexos}
                            <button onclick="irParaEditar('${encodeURIComponent(pedido.cliente)}', '${encodeURIComponent(pedido.descricao)}')" class="btn-acao btn-editar" style="margin-top:5px; border-top: 1px dashed #ccc; padding-top:10px;">Editar registro</button>
                        </div>
                    </td>
                </tr>
            `;
            corpo.innerHTML += rowHTML;
        });

    } catch (e) {
        console.error("Erro:", e);
        status.innerText = "Erro ao carregar dados.";
        corpo.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding: 30px;">Falha na conexão.</td></tr>';
    }
}

// Função auxiliar para o botão editar (que você já deve ter ou precisa adicionar)
function irParaEditar(cliente, descricao) {
    window.location.href = `cadastro.html?edit=true&cliente=${cliente}&desc=${descricao}`;
}

        // Inicia o carregamento ao abrir a página
        window.onload = carregarDados;
    </script>
</body>
</html>
