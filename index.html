<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedidos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        h2 { color: #333; }
        @media screen and (max-width: 600px) {
    table, thead, tbody, th, td, tr { 
        display: block; 
    }
    
    /* Esconde o cabeçalho azul no mobile */
    thead tr { 
        position: absolute;
        top: -9999px;
        left: -9999px;
    }
    
    tr { 
        border: 1px solid #ccc; 
        margin-bottom: 10px;
        border-radius: 8px;
        background: #fff;
    }
    
    td { 
        border: none;
        border-bottom: 1px solid #eee; 
        position: relative;
        padding-left: 50%; 
        text-align: right;
    }
    
    /* Cria rótulos para cada dado */
    td:before { 
        position: absolute;
        left: 10px;
        width: 45%; 
        padding-right: 10px; 
        white-space: nowrap;
        text-align: left;
        font-weight: bold;
        color: #007bff;
    }
    
    td:nth-of-type(1):before { content: "Data"; }
    td:nth-of-type(2):before { content: "Cliente"; }
    td:nth-of-type(3):before { content: "Descrição"; }
    td:nth-of-type(4):before { content: "Ação"; }
}
        .btn-novo { 
            background: #28a745; color: white; padding: 12px 20px; 
            text-decoration: none; border-radius: 5px; display: inline-block; 
            margin-bottom: 20px; font-weight: bold;
        }
        .tabela-wrapper { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
        th { background: #007bff; color: white; text-transform: uppercase; font-size: 13px; }
        tr:hover { background: #f9f9f9; }
        .link-foto { color: #007bff; text-decoration: none; font-weight: bold; border: 1px solid #007bff; padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        .link-foto:hover { background: #007bff; color: white; }
        #status-msg { margin-bottom: 10px; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 Pedidos Registrados</h2>
        
        <div id="status-msg">Carregando dados do servidor...</div>
        
        <a href="cadastro.html" class="btn-novo">+ Novo Registro</a>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Descrição</th>
                        <th>Arquivo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // CERTIFIQUE-SE DE QUE ESTA URL É A QUE VOCÊ TESTOU NO NAVEGADOR
        const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbwJtiRVRnzqr3lEQo05WAfoEQQWSx3bzJbHfKCNM0sYzOPJbfnHHmvAaCpzCPBa7q52SQ/exec';

        async function carregarDados() {
            const corpo = document.getElementById('corpoTabela');
            const status = document.getElementById('status-msg');

            try {
                const response = await fetch(URL_SCRIPT);
                
                // Se a resposta não for OK, lança erro
                if (!response.ok) throw new Error("Erro na rede");

                const dados = await response.json();
                corpo.innerHTML = '';

                if (!dados || dados.length === 0) {
                    status.innerText = "Nenhum registro encontrado na planilha.";
                    corpo.innerHTML = '<tr><td colspan="4" style="text-align:center">Planilha vazia.</td></tr>';
                    return;
                }

                status.innerText = `Exibindo ${dados.length} registros.`;

                // .reverse() para mostrar os novos primeiro
                dados.reverse().forEach(item => {
                    let dataFormatada = "---";
                    if(item.data) {
                        const d = new Date(item.data);
                        dataFormatada = !isNaN(d) ? d.toLocaleDateString('pt-BR') : item.data;
                    }

                    const row = `
                        <tr>
                            <td>${dataFormatada}</td>
                            <td><strong>${item.cliente || ''}</strong></td>
                            <td>${item.descricao || ''}</td>
                            <td>
                                <a href="${item.arquivoUrl}" target="_blank" class="link-foto">VISUALIZAR</a>
                            </td>
                        </tr>
                    `;
                    corpo.innerHTML += row;
                });

            } catch (e) {
                console.error("Erro detalhado:", e);
                status.innerText = "Erro ao carregar. Verifique o console (F12).";
                corpo.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red">Falha na conexão com o Google Sheets.</td></tr>';
            }
        }

        // Inicia a carga
        window.onload = carregarDados;
    </script>
</body>
</html>
