<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pedidos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; }
        .btn-novo { background: #28a745; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #007bff; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        .link-foto { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📋 Pedidos Registrados</h2>
        
        <a href="cadastro.html" class="btn-novo">+ Novo Registro</a>

        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Descrição</th>
                    <th>Arquivo</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr><td colspan="4">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const URL_SCRIPT = 'SUA_URL_DO_WEB_APP_AQUI';

        async function carregarDados() {
            try {
                const response = await fetch(URL_SCRIPT);
                const dados = await response.json();
                const corpo = document.getElementById('corpoTabela');
                corpo.innerHTML = '';

                if (dados.length === 0) {
                    corpo.innerHTML = '<tr><td colspan="4">Nenhum registro encontrado.</td></tr>';
                    return;
                }

                dados.reverse().forEach(item => { // .reverse() para ver o mais recente primeiro
                    const dataFormatada = new Date(item.data).toLocaleDateString('pt-BR');
                    corpo.innerHTML += `
                        <tr>
                            <td>${dataFormatada}</td>
                            <td>${item.cliente}</td>
                            <td>${item.descricao}</td>
                            <td><a href="${item.arquivoUrl}" target="_blank" class="link-foto">Abrir Arquivo</a></td>
                        </tr>
                    `;
                });
            } catch (e) {
                document.getElementById('corpoTabela').innerHTML = '<tr><td colspan="4">Erro ao carregar dados.</td></tr>';
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
